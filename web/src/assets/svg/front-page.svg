<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Desk surface -->
  <rect x="80" y="280" width="340" height="12" rx="4" fill="currentColor" opacity="0.15"/>
  <!-- Desk legs -->
  <rect x="100" y="292" width="10" height="60" rx="3" fill="currentColor" opacity="0.12"/>
  <rect x="390" y="292" width="10" height="60" rx="3" fill="currentColor" opacity="0.12"/>

  <!-- Monitor -->
  <rect x="180" y="170" width="140" height="100" rx="8" stroke="currentColor" stroke-width="5" fill="none"/>
  <!-- Monitor screen content lines -->
  <line x1="200" y1="200" x2="260" y2="200" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <line x1="200" y1="215" x2="300" y2="215" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <line x1="200" y1="230" x2="280" y2="230" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <line x1="200" y1="245" x2="250" y2="245" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <!-- Monitor stand -->
  <rect x="237" y="270" width="26" height="12" rx="2" fill="currentColor" opacity="0.2"/>

  <!-- Person - head -->
  <circle cx="250" cy="115" r="24" stroke="currentColor" stroke-width="5" fill="none"/>
  <!-- Person - body -->
  <path d="M250 139 L250 175" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <!-- Person - arms reaching toward desk -->
  <path d="M250 155 L215 185" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <path d="M250 155 L285 185" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>

  <!-- Keyboard -->
  <rect x="205" y="258" width="90" height="18" rx="4" stroke="currentColor" stroke-width="3" fill="none" opacity="0.5"/>

  <!-- Floating clipboard icon - top left -->
  <g transform="translate(60, 50)" opacity="0.6">
    <rect x="0" y="8" width="40" height="52" rx="5" stroke="currentColor" stroke-width="3" fill="none"/>
    <rect x="10" y="2" width="20" height="12" rx="4" stroke="currentColor" stroke-width="3" fill="none"/>
    <!-- Checkmark -->
    <polyline points="10,35 17,42 30,28" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Floating document icon - top right -->
  <g transform="translate(380, 40)" opacity="0.5">
    <rect x="0" y="0" width="44" height="56" rx="5" stroke="currentColor" stroke-width="3" fill="none"/>
    <line x1="10" y1="16" x2="34" y2="16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="26" x2="30" y2="26" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="36" x2="26" y2="36" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Floating routing/pin icon - right side -->
  <g transform="translate(400, 160)" opacity="0.45">
    <circle cx="18" cy="16" r="8" stroke="currentColor" stroke-width="3" fill="none"/>
    <path d="M18 24 L18 40" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <circle cx="18" cy="40" r="3" fill="currentColor"/>
  </g>

  <!-- Floating checkmark badge - left side -->
  <g transform="translate(40, 200)" opacity="0.4">
    <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="3" fill="none"/>
    <polyline points="10,20 17,28 30,14" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="130" cy="80" r="4" fill="currentColor" opacity="0.2"/>
  <circle cx="370" cy="130" r="3" fill="currentColor" opacity="0.15"/>
  <circle cx="100" cy="160" r="3" fill="currentColor" opacity="0.18"/>
  <circle cx="440" cy="250" r="4" fill="currentColor" opacity="0.12"/>
  <circle cx="350" cy="320" r="3" fill="currentColor" opacity="0.1"/>
</svg>
