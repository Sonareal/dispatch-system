<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Clipboard body -->
  <rect x="45" y="40" width="110" height="140" rx="12" stroke="currentColor" stroke-width="8" fill="none"/>
  <!-- Clipboard clip -->
  <rect x="72" y="28" width="56" height="24" rx="8" stroke="currentColor" stroke-width="8" fill="none"/>
  <!-- Routing arrow: horizontal line with turn -->
  <path d="M72 95 L115 95 L115 130" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrowhead -->
  <polyline points="100,118 115,138 130,118" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Dot at start of route -->
  <circle cx="72" cy="95" r="6" fill="currentColor"/>
</svg>
